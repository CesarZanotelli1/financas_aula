version: "3.8"

services:
  db:
    image: postgres:15
    container_name: postgres_db_homolog
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: financas_db
    ports:
      - "5433:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: node_app_homolog
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: homolog
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: 123
      DB_NAME: financas_db
      DB_PORT: 5432
      SESSION_SECRET: adsdadad!
    restart: always
